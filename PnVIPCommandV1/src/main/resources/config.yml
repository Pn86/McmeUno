  reload_success: "&aPnVIPCommandV1 配置已重载。"
  pnvc_usage: "&c用法: /pnvc reload"
  cooldown: "&e冷却中，请等待 &6%seconds% &e秒后再使用。"

  ptp_usage: "&c用法: /ptp <玩家名>"
  target_offline: "&c目标玩家不在线。"
  ptp_target_whitelisted: "&c该玩家在传送保护白名单中，不能传送。"
  ptp_success: "&a已传送到玩家 &e%player%&a。"

  pgive_usage: "&c用法: /pgive <物品ID>"
  pgive_simple_id_only: "&c只能填写纯物品ID，不能填写NBT或其他参数。"
  invalid_item: "&c无效的物品ID。"
