cooldowns:
  ptp: 30
  pgive: 60
  ptime: 60
  pweather: 60
  pexp: 120

# /ptp 不能传送到这些玩家
tp_player_whitelist:
  - Admin
  - Owner


# /ptime 仅允许在这些世界使用（留空表示所有世界都允许）
time_world_whitelist:
  - world

# /pweather 仅允许在这些世界使用（留空表示所有世界都允许）
weather_world_whitelist:
  - world

# /pgive 不能获取这些物品ID（使用 Material 名称）
give_item_blacklist:
  - COMMAND_BLOCK
  - CHAIN_COMMAND_BLOCK
  - REPEATING_COMMAND_BLOCK
  - BARRIER
  - BEDROCK

messages:
  no_permission: "&c你没有权限使用此指令。"
