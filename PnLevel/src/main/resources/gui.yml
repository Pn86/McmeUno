common:
  return-name: '&c返回'

gift:
  title: '&8等级奖励菜单 &7(%page%/%pages%)'
  rows: 6
  return-position: 'left_bottom' # left_bottom 或 middle_bottom
  buttons:
    prev: '&e上一页'
    next: '&e下一页'
    claim-all: '&a一键领取全部可领取奖励'
  level-item:
    claimed:
      material: GRAY_STAINED_GLASS_PANE
      name: '&7等级 %level% 奖励（已领取）'
      lore:
        - '&8该等级奖励已经领取'
    claimable:
      material: LIME_STAINED_GLASS_PANE
      name: '&a等级 %level% 奖励（可领取）'
      lore:
        - '&7点击领取该等级奖励'
    locked:
      material: RED_STAINED_GLASS_PANE
      name: '&c等级 %level% 奖励（未解锁）'
      lore:
        - '&7你的当前等级: &e%player_level%'

top:
  title: '&8等级排行榜 - 金字塔'
  return-position: 'middle_bottom' # left_bottom 或 middle_bottom
  item:
    name: '&6#%rank% &f%player%'
    lore:
      - '&7等级: &e%level%'
      - '&7经验: &b%exp%'
