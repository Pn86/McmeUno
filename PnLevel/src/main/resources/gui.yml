common:
  return-name: '&c返回'

gift:
  title: '&8等级奖励菜单 &7(%page%/%pages%)'
  rows: 6
  # content-slots 为空则默认使用前5排(0~44)作为内容区域
  content-slots: []

  buttons:
    prev:
      slot: 48
      material: ARROW
      name: '&e上一页'
      lore:
        - '&7点击查看上一页'
    next:
      slot: 49
      material: ARROW
      name: '&e下一页'
      lore:
        - '&7点击查看下一页'
    claim-all:
      slot: 50
      material: CHEST
      name: '&a一键领取全部可领取奖励'
      lore:
        - '&7点击领取所有可领取等级奖励'
    return:
      slot: 53
      material: BARRIER
      name: '&c返回'
      lore:
        - '&7返回并执行配置命令'

  level-item:
    claimed:
      material: GRAY_STAINED_GLASS_PANE
      name: '&7等级 %level% 奖励（已领取）'
      lore:
        - '&8该等级奖励已经领取'
    claimable:
      material: LIME_STAINED_GLASS_PANE
      name: '&a等级 %level% 奖励（可领取）'
      lore:
        - '&7点击领取该等级奖励'
    locked:
      material: RED_STAINED_GLASS_PANE
      name: '&c等级 %level% 奖励（未解锁）'
      lore:
        - '&7你的当前等级: &e%player_level%'

top:
  title: '&8等级排行榜 - 金字塔'
  rows: 5
  # 金字塔层级槽位，支持完全自定义（最多前15）
  layout-slots:
    - 4
    - 12
    - 14
    - 20
    - 22
    - 24
    - 28
    - 30
    - 32
    - 34
    - 36
    - 38
    - 40
    - 42
    - 44

  item:
    material: PLAYER_HEAD
    name: '&6#%rank% &f%player%'
    lore:
      - '&7等级: &e%level%'
      - '&7经验: &b%exp%'

  buttons:
    return:
      slot: 40
      material: BARRIER
      name: '&c返回'
      lore:
        - '&7返回并执行配置命令'
