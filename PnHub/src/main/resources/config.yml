# 玩家连接代理后优先进入的子服务器名称
# 该名称必须与 velocity.toml 中 [servers] 的键一致
target-server: "lobby"

messages:
  player-only: "&c该命令仅玩家可用。"
  console-only: "&c该命令仅控制台可用。"
  usage: "&e用法: /pnhub reload"
  reload-success: "&aPnHub 配置重载成功。"
  reload-failed: "&cPnHub 配置重载失败，请查看控制台日志。"
  server-not-found: "&c目标服务器 &e{server} &c不存在，请联系管理员。"
  connecting: "&a正在将你传送到 &e{server}&a ..."
  already-in-hub: "&e你已经在大厅服务器。"
